    <title>Derk_403</title>

<body>

    <!-- ── LOGIN SCREEN ── -->

    <div id="theme-selector">
        <span class="theme-label">Themes</span>

            <button onclick="setTheme('matrix')">Matrix</button>

<div id="learning-btn" onclick="alert('Under construction, learning mode coming soon!')">
